<!DOCTYPE html>
<html>
<head>
  <title>Apply for Staff Role</title>
  <link rel="stylesheet" href="home.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>
</head>
<body>
  <h2 style="text-align:center;">Staff Application Form</h2>
  <form id="staffForm" style="max-width:600px; margin:20px auto;">
    <label>Name:</label><br/>
    <input type="text" id="name" required /><br/><br/>

    <label>Email:</label><br/>
    <input type="email" id="email" required /><br/><br/>

    <label>Role you're applying for:</label><br/>
    <select id="role" required>
      <option value="">Select a role</option>
      <option value="Head Admin">Head Admin</option>
      <option value="Admin">Admin</option>
      <option value="Stat Manager">Stat Manager</option> 
      <option value="Transfer Admin">Transfer Admin</option>
    </select><br/><br/>

    <label>Experience:</label><br/>
    <textarea id="experience" rows="4" required></textarea><br/><br/>

    <button type="submit">Submit Application</button>
  </form>

  <script>
    auth.onAuthStateChanged((user) => {
      if (!user) return;

      document.getElementById("staffForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const role = document.getElementById("role").value;
        const experience = document.getElementById("experience").value.trim();

        await db.collection("pce_staff_applications").add({
          userId: user.uid,
          name,
          email,
          role,
          experience,
          submittedAt: new Date(),
          status: "pending"
        });

        alert("Application submitted successfully!");
        document.getElementById("staffForm").reset();
      });
    });
  </script>
</body>
</html>
