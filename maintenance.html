<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FSL Maintenance</title>
  <link rel="stylesheet" href="home.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom right, #1a1a1a, #2c2c2c);
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      color: #ff3366;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      max-width: 600px;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    a.button:hover {
      background-color: #4752c4;
    }
  </style>
</head>
<body>
  <h1>🚧  PCE is Under Maintenance</h1>
  <p>
    We're currently working on upgrades to the dashboard, login system, and overall experience.<br>
    For updates and announcements, please visit our Discord community.
  </p>

  <div class="button-group">
    <a class="button" href="https://discord.gg/NmQGcXxc" target="_blank">Join Our Discord</a>
    <a class="button" href="login.html">Admin Login</a>
  </div>
</body>
</html>
