<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <h1>📝 Create an Account</h1>
  <form onsubmit="handleSignup(event)">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Sign Up</button>
  </form>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // ✅ Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyB0C5O-9xh9CrmLnsD2kquCyJ1zTtYkiLg",
      authDomain: "fifa-super-league.firebaseapp.com",
      projectId: "fifa-super-league",
      storageBucket: "fifa-super-league.appspot.com",
      messagingSenderId: "407346622789",
      appId: "1:407346622789:web:6b48448ca0410ccf588e2c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ✅ Sign-Up Handler
    function handleSignup(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;

          // ✅ Save to Realtime DB
          db.ref("users/" + user.uid).set({
            email: user.email,
            role: "Member",
            createdAt: new Date().toISOString()
          });

          // ✅ Save locally
          localStorage.setItem("loggedInUser", JSON.stringify({
            email: user.email,
            role: "Member"
          }));

          alert("✅ Account created!");
          window.location.href = "index.html";
        })
        .catch((error) => {
          if (error.code === "auth/email-already-in-use") {
            alert("🚫 That email is already registered. Try logging in instead.");
            window.location.href = "login.html";
          } else {
            alert("🚫 Sign-up failed: " + error.message);
          }
        });
    }
  </script>
</body>
</html>
