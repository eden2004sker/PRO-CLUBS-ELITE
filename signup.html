<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      display: block;
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <!-- Maintenance redirect protection -->
  <script>
    const maintenance = localStorage.getItem("maintenanceMode") === "true";
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    const devEmails = ["eden@example.com", "admin@example.com"];

    if (maintenance && (!user || !devEmails.includes(user.email))) {
      window.location.href = "maintenance.html";
    }
  </script>

  <h2>Sign Up</h2>
  <form onsubmit="signup(event)">
    <input type="text" id="signupUsername" placeholder="Username" required />
    <input type="email" id="signupEmail" placeholder="Email" required />
    <input type="text" id="signupTag" placeholder="Gamer Tag" required />
    <input type="password" id="signupPassword" placeholder="Password" required />
    <button type="submit">Create Account</button>
  </form>

  <script>
    function signup(e) {
      e.preventDefault();

      const username = document.getElementById("signupUsername").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const tag = document.getElementById("signupTag").value.trim();
      const password = document.getElementById("signupPassword").value.trim();

      let users = JSON.parse(localStorage.getItem("fslUsers")) || [];

      const exists = users.some(u => u.email === email || u.tag === tag);
      if (exists) {
        alert("That email or tag is already taken.");
        return;
      }

      const newUser = {
        username,
        email,
        tag,
        password,
        team: "Unassigned",
        manager: "Unassigned",
        role: "Member",
        banned: false,
        activity: "0%"
      };

      users.push(newUser);
      localStorage.setItem("fslUsers", JSON.stringify(users));
      localStorage.setItem("loggedInUser", JSON.stringify(newUser));

      alert("Account created! Redirecting...");
      window.location.href = "dashboard.html"; // or index.html
    }
  </script>

</body>
</html>
