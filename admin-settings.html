<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8" />
    <title>admin settings - pro clubs Elite</title>
    <link rel="stylesheet" href="admin.css" />
    </head>
<body>

  <div clas="admin-nav">
   <button class="admin-btn" onclick="window.location.href='admin.html'">← Back to Admin Panel</button>
  </div>

  <div class="admin-section">
    <h2>⚙️ Admin Settings</h2>
    <form class="settings-form">
      <label>
        <span>Enable Manager Applications:</span>
        <input type="checkbox" id="toggleManagerApps" />
      </label>
        <span>Enable Staff Applications:</span>
        <input type="checkbox" id="toggleStaffApps" />
      </label>
        <span>Show Audit Logs:</span>
        <input type="checkbox" id="toggleAuditLogs" />
      </label>
  <span>Enable Maintenance Mode:</span>
  <input type="checkbox" id="toggleMaintenance" />
</label>
      <button type="submit">Save Settings</button>
    </form>
  </div>

   <script>
    document.querySelector(".settings-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const settings = {
        managerApps: document.getElementById("toggleManagerApps").checked,
        staffApps: document.getElementById("toggleStaffApps").checked,
        auditLogs: document.getElementById("toggleAuditLogs").checked,
        maintenanceMode: document.getElementById("toggleMaintenance").checked
      };
      localStorage.setItem("adminSettings", JSON.stringify(settings));
      alert("✅ Settings saved!");
    });

    // Load saved settings
    const saved = JSON.parse(localStorage.getItem("adminSettings"));
    if (saved) {
      document.getElementById("toggleManagerApps").checked = saved.managerApps;
      document.getElementById("toggleStaffApps").checked = saved.staffApps;
      document.getElementById("toggleAuditLogs").checked = saved.auditLogs;
      document.getElementById("toggleMaintenance").checked = saved.maintenanceMode;
    }
  </script>
