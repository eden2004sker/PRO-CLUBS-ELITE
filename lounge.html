<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pro Clubs Elite Lounge</title>
  <link rel="stylesheet" href="home.css" />
  <style>
    body {
      background-color: #001f3f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }

    .lounge-header {
      background: linear-gradient(to right, #003366, #004080);
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .lounge-content {
      padding: 30px;
      text-align: center;
    }

    .lounge-content p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .back-button {
      background-color: #fff;
      color: #003366;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.2s ease;
    }

    .back-button:hover {
      background-color: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="lounge-header">🏟️ Pro Clubs Elite Lounge</div>

  <div class="lounge-content">
    <p>Welcome to the Lounge! This is your space to chill, chat, and connect with your squad.</p>
    <p>Use this area to post announcements, share match highlights, or just hang out between fixtures.</p>

    <button class="back-button" onclick="window.location.href='index.html'">← Back to Homepage</button>
  </div>
</body>
</html>
