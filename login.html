<script>
  const maintenance = localStorage.getItem("maintenanceMode") === "true";
  const user = JSON.parse(localStorage.getItem("loggedInUser"));
  const devEmails = ["eden@example.com", "admin@example.com"];

  if (maintenance && (!user || !devEmails.includes(user.email))) {
    window.location.href = "maintenance.html";
  }
</script>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="home.css" />
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    form {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #ff3366;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #cc2952;
    }
  </style>
</head>
<body>
  <h1>🔐 Admin Login</h1>
  <form onsubmit="handleLogin(event)">
    <input type="text" id="username" placeholder="Username" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Log In</button>
  </form>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "admin" && password === "fsl123") {
        localStorage.setItem("isLoggedIn", "true");
        alert("✅ Admin login successful!");
        window.location.href = "index.html";
      } else {
        alert("🚫 Incorrect credentials. Only admins can log in during maintenance.");
        window.location.href = "maintenance.html";
      }
    }
  </script>
</body>
</html>
