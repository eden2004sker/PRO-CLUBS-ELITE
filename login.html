<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCE - User Login</title>
    <link rel="stylesheet" href="home.css">
    <style>
        /* Styles specific to the login card */
        .login-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background-color: #00274d;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.7);
            text-align: center;
        }
        .login-container h1 {
            color: #ff3c00;
            margin-bottom: 25px;
            font-size: 28px;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #003366;
            border-radius: 6px;
            background-color: #0b1a2b;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        .login-form button {
            width: 100%;
            padding: 12px;
            background-color: #ff3c00;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .login-form button:hover {
            background-color: #e03500;
        }
        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2a3d54;
            color: white;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            text-align: center;
        }
        .message-box button {
            margin-top: 10px;
            background: #ff3c00;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="messageBox" class="message-box">
        <p id="messageText"></p>
        <button onclick="document.getElementById('messageBox').style.display='none'">OK</button>
    </div>

    <div class="login-container">
        <h1>PCE Member Login</h1>
        
        <form id="loginForm" class="login-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        
        <p style="margin-top: 20px; font-size: 14px;">
            <a href="#" style="color: #66ccff; text-decoration: none;" onclick="showMessage('Password reset functionality coming soon!')">Forgot Password?</a>
        </p>

        <p style="margin-top: 20px; font-size: 14px;">
            <a href="index.html" style="color: #ccc; text-decoration: none;">&leftarrow; Back to Home</a>
        </p>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
