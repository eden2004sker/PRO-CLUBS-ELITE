<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="home.css" />
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    form {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #ff3366;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #cc2952;
    }
  </style>
</head>
<body>
  <script>
    const maintenance = localStorage.getItem("maintenanceMode") === "true";
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    const devEmails = ["eden@example.com", "admin@example.com"];

    if (maintenance && (!user || !devEmails.includes(user.email))) {
      window.location.href = "maintenance.html";
    }
  </script>

  <h1>🔐 Admin Login</h1>
  <form onsubmit="handleLogin(event)">
    <input type="text" id="username" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Log In</button>
  </form>

  <!-- ✅ Firebase v8 Global SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB0C5O-9xh9CrmLnsD2kquCyJ1zTtYkiLg",
      authDomain: "fifa-super-league.firebaseapp.com",
      projectId: "fifa-super-league",
      storageBucket: "fifa-super-league.firebasestorage.app",
      messagingSenderId: "407346622789",
      appId: "1:407346622789:web:6b48448ca0410ccf588e2c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          localStorage.setItem("loggedInUser", JSON.stringify({ email: user.email }));
          alert("✅ Login successful!");
          window.location.href = "index.html";
        })
        .catch((error) => {
          alert("🚫 Login failed: " + error.message);
          window.location.href = "maintenance.html";
        });
    }
  </script>
</body>
</html>
