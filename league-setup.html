<!DOCTYPE html>
<html lang="en">
<head>
    <a href="league-table.html" style="display: block; text-align: left; margin-bottom: 20px; color: #ffcc00; text-decoration: none; font-size: 0.9rem;">
    ← View Live League Table
</a>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Custom League Table</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0d1117; }
    .card { background-color: #161b22; }
    .btn-primary { background-color: #238636; transition: background-color 0.2s; }
    .btn-primary:hover { background-color: #2ea043; }
    .list-item { background-color: #21262d; border-bottom: 1px solid #30363d; }
    .list-item:hover { background-color: #2e353f; }
  </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-3xl mx-auto card p-6 md:p-10 rounded-xl shadow-2xl text-white">
  <h1 class="text-3xl font-bold text-yellow-400 mb-6 border-b border-gray-700 pb-3">
    Custom League Setup
  </h1>
  <p class="text-gray-400 mb-6">
    Select the teams you want to include in your personalized league table. Only matches between your selected teams will count towards your league standings.
  </p>

  <!-- League Name Input -->
  <div class="mb-6">
    <label for="leagueName" class="block text-sm font-medium text-gray-300 mb-2">League Name</label>
    <input type="text" id="leagueName" placeholder="My Custom EPL Fantasy League"
           class="w-full p-3 rounded-lg bg-gray-700 text-white border border-gray-600 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition duration-150">
  </div>

  <h2 class="text-xl font-semibold text-gray-300 mb-4">Select Participating Teams:</h2>

  <!-- Team Selection List -->
  <div id="teamList" class="space-y-1 max-h-96 overflow-y-auto rounded-lg border border-gray-700 p-2">
    <div class="text-center p-4 text-gray-500">Loading teams...</div>
  </div>

  <!-- Actions and Messages -->
  <div class="mt-8 flex flex-col sm:flex-row gap-4">
    <button id="saveButton" class="flex-1 btn-primary text-white font-bold py-3 px-6 rounded-lg shadow-md disabled:opacity-50" disabled>
      <span id="saveText">Save Custom League</span>
    </button>
    <button id="selectAllButton" class="w-auto sm:w-1/3 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-150">
      Select/Deselect All
    </button>
  </div>

  <div id="messageBox" class="mt-4 p-3 rounded-lg text-center font-medium hidden" role="alert"></div>

  <a href="league-table.html" class="block text-center mt-6 text-blue-400 hover:text-blue-300 transition duration-150 text-sm">
    Go to League Table
  </a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0C5O-9xh9CrmLnsD2kquCyJ1zTtYkiLg",
    authDomain: "fifa-super-league.firebaseapp.com",
    projectId: "fifa-super-league",
    appId: "1:407346622789:web:6b48448ca0410ccf588e2c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const appId = "pce"; // or dynamic if needed
  const initialAuthToken = null; // replace if using custom token
  const CUSTOM_LEAGUE_PATH = (uid) => `artifacts/${appId}/users/${uid}/custom_league/setup`;

  const PREMIER_LEAGUE_TEAMS = [
    "Arsenal", "Aston Villa", "Bournemouth", "Brentford", "Brighton & Hove Albion",
    "Chelsea", "Crystal Palace", "Everton", "Fulham", "Ipswich Town",
    "Leicester City", "Liverpool", "Manchester City", "Manchester United",
    "Newcastle United", "Nottingham Forest", "Southampton", "Tottenham Hotspur",
    "West Ham United", "Wolverhampton Wanderers"
  ];

  const teamListEl = document.getElementById('teamList');
  const leagueNameInput = document.getElementById('leagueName');
  const saveButton = document.getElementById('saveButton');
  const saveText = document.getElementById('saveText');
  const messageBox = document.getElementById('messageBox');
  const selectAllButton = document.getElementById('selectAllButton');

  let userId = null;
  let selectedTeams = new Set();

  function showStatus(message, className) {
    messageBox.textContent = message;
    messageBox.className = `mt-4 p-3 rounded-lg text-center font-medium ${className}`;
    messageBox.classList.remove('hidden');
  }

  function renderTeamList() {
    teamListEl.innerHTML = '';
    PREMIER_LEAGUE_TEAMS.forEach(team => {
      const isChecked = selectedTeams.has(team);
      const item = document.createElement('div');
      item.className = 'list-item p-3 flex justify-between items-center cursor-pointer rounded-md';
      item.innerHTML = `
        <span class="text-gray-200">${team}</span>
        <input type="checkbox" data-team="${team}" class="form-checkbox h-5 w-5 text-yellow-500 rounded border-gray-300 bg-gray-600" ${isChecked ? 'checked' : ''}>
      `;
      teamListEl.appendChild(item);
    });
  }

  teamListEl.addEventListener('click', (e) => {
    const checkbox = e.target.closest('input[type="checkbox"]');
    if (checkbox) {
      const team = checkbox.dataset.team;
      checkbox.checked ? selectedTeams.add(team) : selectedTeams.delete(team);
    }
  });

  selectAllButton.addEventListener('click', () => {
    if (selectedTeams.size === PREMIER_LEAGUE_TEAMS.length) {
      selectedTeams.clear();
    } else {
      selectedTeams = new Set(PREMIER_LEAGUE_TEAMS);
    }
    renderTeamList();
  });

  saveButton.addEventListener('click', async () => {
    if (!userId) return showStatus("Authentication required.", 'bg-red-900 text-red-300');
    if (selectedTeams.size < 2) return showStatus("Select at least two teams.", 'bg-red-900 text-red-300');

    saveButton.disabled = true;
    saveText.textContent = "Saving...";

    const leagueData = {
      leagueName: leagueNameInput.value.trim() || 'Custom League',
      teams: Array.from(selectedTeams),
      lastUpdated: new Date().toISOString()
    };

    try {
      await setDoc(doc(db, CUSTOM_LEAGUE_PATH(userId)), leagueData);
      showStatus("Custom league saved successfully!", 'bg-green-900 text-green-300');
    } catch (error) {
      console.error("Save error:", error);
      showStatus("Failed to save league.", 'bg-red-900 text-red-300');
    } finally {
      saveButton.disabled = false;
      saveText.textContent = "Save Custom League";
    }
  });

  async function loadCustomLeague() {
    try {
      const docSnap = await getDoc(doc(db, CUSTOM_LEAGUE_PATH(userId)));
      if (docSnap.exists()) {
        const data = docSnap.data();
        leagueNameInput.value = data.leagueName || 'My Custom League';
        selectedTeams = new Set(data.teams || PREMIER_LEAGUE_TEAMS);
        showStatus(`Loaded ${selectedTeams.size} teams.`, 'bg-blue-900 text-blue-300');
      } else {
        selectedTeams = new Set(PREMIER_LEAGUE_TEAMS);
        leagueNameInput.value = 'Full Premier League Season';
       showStatus("Defaulting to all 20 teams.", 'bg-gray-700 text-gray-300');
      }

 renderTeamList();
      saveButton.disabled = false;
    } catch (error) {
      console.error("Error loading custom league:", error);
      showStatus("Error loading setup.", 'bg-red-900 text-red-300');
    }
  }

  // Initialize Firebase and load data
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      userId = user.uid;
      await loadCustomLeague();
    } else {
      try {
        if (initialAuthToken) {
          await signInWithCustomToken(auth, initialAuthToken);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Auth Error:", error);
        showStatus("Error signing in. Please check console.", 'bg-red-900 text-red-300');
      }
    }
  });
</script>

</body>
</html>
